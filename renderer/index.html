<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modpack Installer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Modpack Installer</h1>
    </header>
    <main id="cards"></main>
    <footer>
      <div class="footer-actions">
        <button id="btnCompat" class="fluent-btn" onclick="launchCompatibility()">Extras de Compatibilidad</button>
        <button id="btnSettings" class="fluent-btn" onclick="goSettings()">Ajustes</button>
        <button id="btnUpdates" class="fluent-btn primary" onclick="goUpdates()">Buscar Actualizaciones</button>
      </div>
      <p id="madeBy" style="margin: 0; font-size: 12px; color: #888;"></p>
    </footer>
  </div>
  <script src="fluent.js"></script>
  <script src="renderer.js"></script>
  <script>
    function goUpdates() {
      window.location.href = "updates.html";
    }
  </script>
</body>
</html>

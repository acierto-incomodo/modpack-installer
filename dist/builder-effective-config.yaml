directories:
  output: dist
  buildResources: build
appId: com.stormgamesstudios.modpackinstaller
artifactName: Modpack-Installer-Setup-${version}.${ext}
productName: Modpack Installer
files:
  - filter:
      - installers
      - minecraftlauncher
      - compatibility
      - node_modules
      - renderer
      - instances.json
      - main.js
      - preload.js
      - package.json
      - config.json
      - assets
asarUnpack:
  - minecraftlauncher/**
  - compatibility/**
publish:
  - provider: github
    owner: acierto-incomodo
    repo: modpack-installer
win:
  target: nsis
  icon: assets/icons/logo.png
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  include: build/installer.nsh
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Modpack Installer
  differentialPackage: true
electronVersion: 41.1.0
